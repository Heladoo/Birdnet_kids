<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birdnet Kids - Bird sounds!</title>
<link rel="icon" href="favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <img class="logo-badge" src="logo-badge.png" alt="BirdNET Kids">
  <p class="subtitle">Tap a bird to hear its song</p>
</header>

<div class="sort-buttons">
  <button class="sort-btn active" data-sort="last_seen">🕓 Newest</button>
  <button class="sort-btn" data-sort="week_count">🐣 Common</button>
</div>

<div class="grid" id="grid">
  <p class="loading">Loading birds...</p>
</div>

<footer class="credits">
  <a href="https://github.com/mcguirepr89/BirdNET-Pi" target="_blank" rel="noopener">Powered by BirdNET-Pi</a>
  <span class="credits-sep">·</span>
  <a href="https://app.birdweather.com/stations/18372" target="_blank" rel="noopener">Our BirdWeather station</a>
</footer>
<p class="visit-counter"><span id="visit-count">–</span> visits</p>

<audio id="player"></audio>
<script src="app.js"></script>
</body>
</html>
